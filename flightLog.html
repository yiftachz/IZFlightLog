<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Flight Log Verification</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e17; --surface: #111827; --surface2: #1a2235; --border: #1e3a5f;
    --accent: #0ea5e9; --accent2: #38bdf8; --text: #e2e8f0; --muted: #64748b;
    --success: #10b981; --mono: 'Share Tech Mono', monospace; --sans: 'Barlow', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; padding-bottom: 60px; }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 20px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 12px; }
  .header-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .header-title { font-family: var(--mono); font-size: 13px; color: var(--accent2); letter-spacing: 0.08em; text-transform: uppercase; }
  .header-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .section { padding: 0 16px; margin-top: 20px; }
  .section-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); padding: 0 4px 8px 4px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
  .field input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--mono); font-size: 15px; padding: 10px 12px; outline: none; color-scheme: dark; }
  .custom-select-wrap { position: relative; }
  .custom-select-wrap select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--mono); font-size: 15px; padding: 10px 12px; outline: none; -webkit-appearance: none; appearance: none; color-scheme: dark; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .grid-lnd { display: grid; grid-template-columns: 1fr 0.7fr 1.3fr; gap: 10px; }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; height: 43px; }
  .toggle { position: relative; width: 44px; height: 24px; }
  .toggle input { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; z-index: 2; }
  .toggle-track { position: absolute; inset: 0; background: var(--border); border-radius: 12px; transition: 0.2s; }
  .toggle-thumb { position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; background: white; border-radius: 50%; transition: 0.2s; }
  .toggle.on .toggle-track { background: var(--accent); }
  .toggle.on .toggle-thumb { transform: translateX(20px); }
  .crew-block { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .crew-row { display: flex; align-items: center; border-bottom: 1px solid var(--border); }
  .crew-tag { font-family: var(--mono); font-size: 10px; color: var(--accent); width: 52px; text-align: center; }
  .crew-input { flex: 1; background: transparent; border: none; border-left: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 15px; padding: 11px 12px; outline: none; }
  .submit-btn { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-family: var(--mono); font-size: 14px; padding: 16px; margin-top: 20px; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; }
  .status { text-align: center; font-family: var(--mono); font-size: 13px; margin-top: 15px; display: none; }
  .status.success { color: var(--success); display: block; }
  .status.error { color: #f87171; display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">✈</div>
  <div>
    <div class="header-title">Flight Log Verification</div>
    <div class="header-sub" id="header-flight">Review &amp; Confirm Data</div>
  </div>
</div>

<form id="logform">
  <input type="hidden" name="Make_ID" id="f_Make_ID">

  <div class="section">
    <div class="section-label">Flight Info</div>
    <div class="grid-2">
      <div class="field"><label>Date</label><input type="date" name="Date" id="f_Date"></div>
      <div class="field"><label>Flight No.</label><input type="text" name="Flight_no" id="f_Flight_no"></div>
    </div>
    <div class="grid-2">
      <div class="field">
        <label>Aircraft</label>
        <div class="custom-select-wrap">
          <select name="ACFT" id="f_ACFT">
            <option value="">— —</option>
            <option value="4XAGH">4XAGH</option><option value="4XAGK">4XAGK</option>
            <option value="4XAGO">4XAGO</option><option value="4XAGV">4XAGV</option>
            <option value="4XAGY">4XAGY</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Training</label>
        <div class="toggle-row">
          <span style="font-size:12px; color:var(--muted)">Training flt</span>
          <div class="toggle" id="toggle_Training">
            <input type="checkbox" id="f_Training" name="Training" value="1">
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Route</div>
    <div class="grid-2">
      <div class="field"><label>Origin ICAO</label><input type="text" name="Origin_ICAO" id="f_Origin_ICAO" maxlength="4"></div>
      <div class="field"><label>Dest ICAO</label><input type="text" name="Dest_ICAO" id="f_Dest_ICAO" maxlength="4"></div>
    </div>
    <div class="grid-2">
      <div class="field"><label>Origin IATA</label><input type="text" name="Origin_IATA" id="f_Origin_IATA" maxlength="3"></div>
      <div class="field"><label>Dest IATA</label><input type="text" name="Dest_IATA" id="f_Dest_IATA" maxlength="3"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Times (Actual)</div>
    <div class="grid-2">
      <div class="field"><label>DEP Date</label><input type="date" name="Actual_DEP_date" id="f_Actual_DEP_date"></div>
      <div class="field"><label>DEP Time</label><input type="text" name="Actual_DEP_time" id="f_Actual_DEP_time" placeholder="00:00"></div>
    </div>
    <div class="grid-2">
      <div class="field"><label>ARR Date</label><input type="date" name="Actual_ARR_date" id="f_Actual_ARR_date"></div>
      <div class="field"><label>ARR Time</label><input type="text" name="Actual_ARR_time" id="f_Actual_ARR_time" placeholder="00:00"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Positions</div>
    <div class="grid-2">
      <div class="field">
        <label>Position</label>
        <div class="custom-select-wrap"><select name="Position" id="f_Position"><option value="">--</option><option value="FO">FO</option><option value="FC">FC</option><option value="DH">DH</option><option value="PIC">PIC</option></select></div>
      </div>
      <div class="field">
        <label>T/O Pos</label>
        <div class="custom-select-wrap"><select name="TO_position" id="f_TO_position"><option value="">--</option><option value="PF">PF</option><option value="PM">PM</option></select></div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Crew</div>
    <div class="crew-block">
      <div class="crew-row"><span class="crew-tag">CM</span><input class="crew-input" type="text" name="CM" id="f_CM" placeholder="Captain"></div>
      <div class="crew-row"><span class="crew-tag">CM1</span><input class="crew-input" type="text" name="extraCM1" id="f_extraCM1"></div>
      <div class="crew-row"><span class="crew-tag">CM2</span><input class="crew-input" type="text" name="extraCM2" id="f_extraCM2"></div>
    </div>
  </div>

  <div style="padding: 0 16px;">
    <button type="submit" class="submit-btn" id="submitBtn">Submit to Logbook</button>
    <div class="status" id="statusMsg"></div>
  </div>
</form>

<script>
  const WEBHOOK = 'https://hook.eu1.make.com/im1x8ft1az331wqj0lkmjukuq3axqlrk';
  const params = new URLSearchParams(window.location.search);
  const now = new Date();
  const pad = (n) => n.toString().padStart(2, '0');
  
  const todayISO = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}`;
  const nowTime = `${pad(now.getHours())}:${pad(now.getMinutes())}`;

  function toISODate(str) {
    if (!str || !str.includes('/')) return str;
    const [d, m, y] = str.split('/');
    return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
  }

  // --- LOGIC FIX: Check if key exists in URL strictly ---
  function getVal(key, defaultValue) {
    if (params.has(key) && params.get(key) !== "") {
      return params.get(key);
    }
    return defaultValue;
  }

  // Set Make_ID
  document.getElementById('f_Make_ID').value = getVal('Make_ID', `MAN_${todayISO.replace(/-/g,'')}${nowTime.replace(/:/g,'')}${pad(now.getSeconds())}`);

  // Apply Defaults
  document.getElementById('f_Date').value = toISODate(getVal('Date', todayISO));
  document.getElementById('f_Actual_DEP_date').value = toISODate(getVal('Actual_DEP_date', todayISO));
  document.getElementById('f_Actual_ARR_date').value = toISODate(getVal('Actual_ARR_date', todayISO));
  
  document.getElementById('f_Actual_DEP_time').value = getVal('Actual_DEP_time', nowTime);
  document.getElementById('f_Actual_ARR_time').value = getVal('Actual_ARR_time', nowTime);
  
  document.getElementById('f_Flight_no').value = getVal('Flight_no', 'IZ 0000');
  document.getElementById('f_Origin_ICAO').value = getVal('Origin_ICAO', '----');
  document.getElementById('f_Dest_ICAO').value = getVal('Dest_ICAO', '----');
  document.getElementById('f_Origin_IATA').value = getVal('Origin_IATA', '---');
  document.getElementById('f_Dest_IATA').value = getVal('Dest_IATA', '---');

  // Fill remaining text fields
  ['CM', 'extraCM1', 'extraCM2'].forEach(id => {
    document.getElementById('f_' + id).value = getVal(id, '');
  });

  // Fill Selects
  ['ACFT', 'Position', 'TO_position'].forEach(id => {
    const val = getVal(id, '');
    const el = document.getElementById('f_' + id);
    if (val && el) el.value = val;
  });

  // Toggle Setup
  const trainingCb = document.getElementById('f_Training');
  const toggleEl = document.getElementById('toggle_Training');
  if (getVal('Training', '0') === '1') {
    trainingCb.checked = true;
    toggleEl.classList.add('on');
  }
  trainingCb.addEventListener('change', () => toggleEl.classList.toggle('on', trainingCb.checked));

  // Submission
  document.getElementById('logform').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const status = document.getElementById('statusMsg');
    btn.disabled = true; btn.textContent = 'Sending...';

    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData.entries());
    data.Training = trainingCb.checked ? '1' : '0';

    try {
      const res = await fetch(WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      if (res.ok) {
        status.textContent = '✓ Logged to Sheets'; status.className = 'status success';
      } else { throw new Error(); }
    } catch (err) {
      status.textContent = '✗ Error sending data'; status.className = 'status error';
      btn.disabled = false; btn.textContent = 'Retry Submission';
    }
  });
</script>
</body>
</html>
